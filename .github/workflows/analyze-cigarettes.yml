name: 分析卷烟投放策略

# ============================================================
# 触发条件：
#   1. 当 data/ 目录下的 xlsx 文件发生变更（新增/修改/删除）时自动触发
#   2. 支持手动触发（workflow_dispatch），便于调试
# ============================================================
on:
  push:
    paths:
      - 'data/**/*.xlsx'
  workflow_dispatch:
    inputs:
      file:
        description: '指定要分析的 xlsx 文件名（留空则分析 data/ 下所有 xlsx）'
        required: false
        default: ''

permissions:
  contents: write   # 允许工作流提交 JSON 回仓库

jobs:
  analyze:
    runs-on: ubuntu-latest
    steps:
      # 1. 检出代码（完整历史，便于排查）
      - name: 检出仓库
        uses: actions/checkout@v4

      # 2. 配置 Python 环境
      - name: 配置 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      # 3. 安装依赖
      - name: 安装依赖
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # 4. 查找待分析的 xlsx 文件
      #    策略：直接递归查找 data/ 下所有 xlsx。
      #    因为 JSON 文件名含投放日期，重复分析同一文件只会覆盖同名 JSON（幂等），
      #    每周仅 1-2 个文件，全量分析开销可忽略，但避免了 git diff 路径匹配的坑。
      - name: 查找待分析文件
        run: |
          mkdir -p output
          if [ -n "${{ github.event.inputs.file }}" ]; then
            # 手动触发：指定单个文件
            echo "data/${{ github.event.inputs.file }}" > changed_files.txt
          else
            # 递归查找 data/ 下所有 xlsx
            find data -name '*.xlsx' -type f > changed_files.txt
          fi
          echo "=== 待分析文件 ==="
          cat changed_files.txt
          echo "=== 文件数量: $(wc -l < changed_files.txt) ==="
          if [ ! -s changed_files.txt ]; then
            echo "::error::data/ 目录下没有找到任何 xlsx 文件，请确认文件已上传到 data/ 目录"
            exit 1
          fi

      # 5. 逐个分析 xlsx 文件，统计成功/失败
      - name: 分析 xlsx 并生成 JSON
        run: |
          success=0
          failed=0
          while IFS= read -r f; do
            [ -z "$f" ] && continue
            echo "=========================================="
            echo "分析: $f"
            if [ ! -f "$f" ]; then
              echo "::warning::文件不存在: $f"
              failed=$((failed+1))
              continue
            fi
            if python scripts/cigarette_parser.py --input "$f" --output-dir output/; then
              success=$((success+1))
            else
              echo "::warning::解析失败: $f"
              failed=$((failed+1))
            fi
          done < changed_files.txt
          echo "=========================================="
          echo "解析完成：成功 $success 个，失败 $failed 个"
          if [ "$success" -eq 0 ]; then
            echo "::error::没有成功解析任何文件，请检查 xlsx 格式或查看上方日志"
            exit 1
          fi
          echo "=== output 目录内容 ==="
          ls -la output/

      # 6. 提交并推送生成的 JSON
      #    用 git add output/ 整目录添加，避免 glob 无匹配时报错；
      #    再用 git diff --cached 判断是否有变更需要提交。
      - name: 提交 JSON 结果
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add output/
          if git diff --cached --quiet; then
            echo "没有新的 JSON 需要提交"
          else
            git commit -m "chore: 自动生成卷烟投放策略 JSON [skip ci]"
            git push
          fi

      # 7. 上传 JSON 为构建产物（便于下载查看，保留 90 天）
      - name: 上传 JSON 产物
        uses: actions/upload-artifact@v4
        with:
          name: cigarette-json-${{ github.run_number }}
          path: output/*.json
          if-no-files-found: warn
          retention-days: 90
